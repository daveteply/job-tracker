# Quarkus configuration
quarkus.http.port=8080
quarkus.analytics.disabled=true

# Database configuration (using standard PG environment variables for production/docker)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://db:5432/${POSTGRES_DB}
quarkus.datasource.username=${POSTGRES_USER}
quarkus.datasource.password=${POSTGRES_PASSWORD}

# Flyway configuration
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=db/migration

# CORS configuration
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:4200
quarkus.http.cors.methods=GET,PUT,POST,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,X-User-Id

# OpenAPI & Swagger metadata
mp.openapi.extensions.smallrye.info.title=Sync Backend API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=High-performance data synchronization for JobTracker.

# Hibernate ORM JSON mapping configuration
# See: https://github.com/quarkusio/quarkus/blob/main/migration-guides/3.30.md#hibernate-orm-json-mapping
quarkus.hibernate-orm.mapping.format.global=ignore
