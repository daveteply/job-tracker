name: Disable User Sync

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'The email address of the user to disable'
        required: true
        type: string

jobs:
  disable:
    name: Disable User
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx nx run sync-backend:prisma-generate

      - name: Run Disable Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run beta:disable ${{ github.event.inputs.email }}
